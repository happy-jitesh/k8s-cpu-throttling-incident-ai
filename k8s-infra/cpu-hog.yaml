apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-hog
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpu-hog
  template:
    metadata:
      labels:
        app: cpu-hog
    spec:
      containers:
      - name: cpu-hog
        image: polinux/stress
        resources:
          limits:
            cpu: "100m"
        command: ["stress"]
        args: ["--cpu", "2"]